name: ${COMPOSE_PROJECT_NAME:-flintbase}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-app-environment: &app-environment
  PORT: "3000"
  GIN_MODE: release
  DEBUG: "false"
  TZ: "${TZ:-UTC}"
  NODE_TYPE: master
  NODE_NAME: "${NODE_NAME:-flintbase-prod-1}"
  SESSION_SECRET: "${SESSION_SECRET:?set_SESSION_SECRET}"
  CRYPTO_SECRET: "${CRYPTO_SECRET:?set_CRYPTO_SECRET}"
  SQL_DSN: "postgresql://${POSTGRES_USER:?set_POSTGRES_USER}:${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set_POSTGRES_DB}?sslmode=disable"
  LOG_CLICKHOUSE_DSN: "clickhouse://${CLICKHOUSE_USER:?set_CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD:?set_CLICKHOUSE_PASSWORD}@clickhouse:9000/${CLICKHOUSE_DB:?set_CLICKHOUSE_DB}"
  REDIS_CONN_STRING: "redis://:${REDIS_PASSWORD:?set_REDIS_PASSWORD}@redis:6379/0"
  ERROR_LOG_ENABLED: "${ERROR_LOG_ENABLED:-true}"
  BATCH_UPDATE_ENABLED: "${BATCH_UPDATE_ENABLED:-true}"
  BATCH_UPDATE_INTERVAL: "${BATCH_UPDATE_INTERVAL:-5}"
  SYNC_FREQUENCY: "${SYNC_FREQUENCY:-60}"
  WORKOS_API_KEY: "${WORKOS_API_KEY:?set_WORKOS_API_KEY}"
  WORKOS_CLIENT_ID: "${WORKOS_CLIENT_ID:?set_WORKOS_CLIENT_ID}"
  WORKOS_REDIRECT_URI: "${WORKOS_REDIRECT_URI:?set_WORKOS_REDIRECT_URI}"
  WORKOS_ROOT_EMAILS: "${WORKOS_ROOT_EMAILS:?set_WORKOS_ROOT_EMAILS}"
  WORKOS_ROOT_USER_IDS: "${WORKOS_ROOT_USER_IDS:-}"
  WORKOS_API_BASE_URL: "${WORKOS_API_BASE_URL:-https://api.workos.com}"
  TRUSTED_REDIRECT_DOMAINS: "${TRUSTED_REDIRECT_DOMAINS:-}"

services:
  db-migrate:
    image: "${FLINTBASE_IMAGE:?set_FLINTBASE_IMAGE}"
    pull_policy: always
    restart: "no"
    entrypoint: ["/new-api-migrator"]
    environment:
      SQL_DSN: "postgresql://${POSTGRES_USER:?set_POSTGRES_USER}:${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set_POSTGRES_DB}?sslmode=disable"
      MIGRATION_DIR: /migrations
      MIGRATION_TIMEOUT: "${MIGRATION_TIMEOUT:-300}"
      RUN_DB_BOOTSTRAP: "true"
      TZ: "${TZ:-UTC}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    logging: *default-logging

  app:
    image: "${FLINTBASE_IMAGE:?set_FLINTBASE_IMAGE}"
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${FLINTBASE_HTTP_BIND:-127.0.0.1}:${FLINTBASE_HTTP_PORT:-3000}:3000"
    volumes:
      - app_data:/data
    environment: *app-environment
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -q -O - --header="Content-Type: application/json" --post-data="{\"query\":\"query { status }\"}" http://127.0.0.1:3000/api/graphql | grep -q "\"success\":true"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
    logging: *default-logging

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?set_POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:?set_POSTGRES_DB}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"'
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?set_REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep -q PONG'
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    logging: *default-logging

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: "${CLICKHOUSE_DB:?set_CLICKHOUSE_DB}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:?set_CLICKHOUSE_USER}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:?set_CLICKHOUSE_PASSWORD}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test:
        - CMD-SHELL
        - 'clickhouse client --user "$${CLICKHOUSE_USER}" --password "$${CLICKHOUSE_PASSWORD}" --query "SELECT 1"'
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - backend
    logging: *default-logging

volumes:
  app_data:
  postgres_data:
  redis_data:
  clickhouse_data:

networks:
  backend:
    driver: bridge
