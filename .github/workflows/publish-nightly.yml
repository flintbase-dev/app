name: Publish Nightly Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".env.example"
      - ".env.example.prod"
      - ".gitattributes"
      - ".gitignore"
      - "bin/**"
      - "docs/**"
      - "Dockerfile.dev"
      - "docker-compose*.yml"
      - "electron/**"
      - "LICENSE"
      - "makefile"
      - "new-api.service"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_SUMMARY: "false"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_pair: linux-amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            platform_pair: linux-arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Resolve image name
        id: image
        shell: bash
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: latest=false
          tags: |
            type=raw,value=nightly

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}"
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=flintbase-${{ matrix.platform_pair }}
          cache-to: type=gha,scope=flintbase-${{ matrix.platform_pair }},mode=max,ignore-error=true
          provenance: false
          sbom: false

      - name: Export image digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  merge:
    name: Publish manifest
    runs-on: ubuntu-24.04
    needs:
      - build

    steps:
      - name: Resolve image name
        id: image
        shell: bash
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: latest=false
          tags: |
            type=raw,value=nightly

      - name: Create and push manifest
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && tag_args+=("-t" "$tag")
          done <<< "$TAGS"

          digest_args=()
          while IFS= read -r digest_file; do
            digest_args+=("${IMAGE_NAME}@sha256:$(basename "$digest_file")")
          done < <(find /tmp/digests -type f | sort)

          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"
